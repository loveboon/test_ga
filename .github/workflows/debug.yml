name: Debug

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  module:
    name: Build module package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      versionCode: ${{ steps.version.outputs.versionCode }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          FILE="module/module.prop"
          version="$(grep '^version=' "$FILE" | cut -d'=' -f2)"
          versionCode="$(git rev-list --count HEAD)"
          sed -i "/^versionCode=/c\versionCode=$versionCode" "$FILE"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "versionCode=$versionCode" >> "$GITHUB_OUTPUT"

      - name: Create module zip
        shell: bash
        run: |
          set -euo pipefail
          rm -f "FuckAD_module-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.versionCode }}-debug.zip"
          (
            cd module
            zip -9r "../FuckAD_module-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.versionCode }}-debug.zip" .
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: FuckAD_module-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.versionCode }}-debug.zip
          path: FuckAD_module-v${{ steps.version.outputs.version }}-${{ steps.version.outputs.versionCode }}-debug.zip
          archive: false
          if-no-files-found: error

  AdGuardHome:
    name: Build FuckAD_AdGuardHome_linux for ${{ matrix.arch }} package
    runs-on: ubuntu-latest
    needs: module
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, armv7]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve archive URL
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.arch }}" in
            arm64)
              echo "archive_url=https://github.com/AdguardTeam/AdGuardHome/releases/latest/download/AdGuardHome_linux_arm64.tar.gz" >> "$GITHUB_OUTPUT"
              ;;
            armv7)
              echo "archive_url=https://github.com/AdguardTeam/AdGuardHome/releases/latest/download/AdGuardHome_linux_armv7.tar.gz" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported arch: ${{ matrix.arch }}" >&2
              exit 1
              ;;
          esac

      - name: Download release archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p cache
          curl -fL "${{ steps.vars.outputs.archive_url }}" -o "cache/AdGuardHome_linux_${{ matrix.arch }}.tar.gz"

      - name: Extract archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "cache/${{ matrix.arch }}"
          tar -xzf "cache/AdGuardHome_linux_${{ matrix.arch }}.tar.gz" -C "cache/${{ matrix.arch }}"

      - name: Stage package files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf staging
          mkdir -p staging
          cp -a AdGuardHome staging/
          cp "cache/${{ matrix.arch }}/AdGuardHome/AdGuardHome" "staging/AdGuardHome/bin/AdGuardHome"

      - name: Create zip package
        shell: bash
        run: |
          set -euo pipefail
          rm -f "FuckAD_AdGuardHome_linux_${{ matrix.arch }}-v${{ needs.module.outputs.version }}-${{ needs.module.outputs.versionCode }}-debug.zip"
          (
            cd staging
            zip -9r "../FuckAD_AdGuardHome_linux_${{ matrix.arch }}-v${{ needs.module.outputs.version }}-${{ needs.module.outputs.versionCode }}-debug.zip" .
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: FuckAD_AdGuardHome_linux_${{ matrix.arch }}-v${{ needs.module.outputs.version }}-${{ needs.module.outputs.versionCode }}-debug.zip
          path: FuckAD_AdGuardHome_linux_${{ matrix.arch }}-v${{ needs.module.outputs.version }}-${{ needs.module.outputs.versionCode }}-debug.zip
          archive: false
          if-no-files-found: error