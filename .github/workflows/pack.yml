name: Pack FuckAD

on:
  workflow_dispatch:
  push:
    tags:
      - "*.*"

permissions:
  contents: write

jobs:
  module:
    name: Build module package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo dev)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create module zip
        shell: bash
        run: |
          set -euo pipefail
          rm -f "FuckAD_module_${{ steps.version.outputs.version }}.zip"
          (
            cd module
            zip -r "../FuckAD_module_${{ steps.version.outputs.version }}.zip" .
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: FuckAD_module
          path: FuckAD_module_${{ steps.version.outputs.version }}.zip
          archive: false
          if-no-files-found: error

  AdGuardHome:
    name: Build FuckAD_AdGuardHome_linux for ${{ matrix.arch }} package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, armv7]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo dev)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve archive URL
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.arch }}" in
            arm64)
              echo "archive_url=https://github.com/AdguardTeam/AdGuardHome/releases/latest/download/AdGuardHome_linux_arm64.tar.gz" >> "$GITHUB_OUTPUT"
              ;;
            armv7)
              echo "archive_url=https://github.com/AdguardTeam/AdGuardHome/releases/latest/download/AdGuardHome_linux_armv7.tar.gz" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported arch: ${{ matrix.arch }}" >&2
              exit 1
              ;;
          esac

      - name: Download release archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p cache
          curl -fL "${{ steps.vars.outputs.archive_url }}" -o "cache/AdGuardHome_linux_${{ matrix.arch }}.tar.gz"

      - name: Extract archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "cache/${{ matrix.arch }}"
          tar -xzf "cache/AdGuardHome_linux_${{ matrix.arch }}.tar.gz" -C "cache/${{ matrix.arch }}"

      - name: Stage package files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf staging
          mkdir -p staging
          cp -a AdGuardHome staging/
          cp "cache/${{ matrix.arch }}/AdGuardHome/AdGuardHome" "staging/AdGuardHome/bin/AdGuardHome"

      - name: Create zip package
        shell: bash
        run: |
          set -euo pipefail
          rm -f "FuckAD_AdGuardHome_linux_${{ matrix.arch }}_${{ steps.version.outputs.version }}.zip"
          (
            cd staging
            zip -r "../FuckAD_AdGuardHome_linux_${{ matrix.arch }}_${{ steps.version.outputs.version }}.zip" .
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: FuckAD_AdGuardHome_linux_${{ matrix.arch }}
          path: FuckAD_AdGuardHome_linux_${{ matrix.arch }}_${{ steps.version.outputs.version }}.zip
          archive: false
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ module, AdGuardHome ]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Validate tag format
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v?[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "Tag must be x.x or x.x.x (optional v prefix), got: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: FuckAD_*
          path: .
          merge-multiple: true
          skip-decompress: true

      - name: Display structure of downloaded files
        run: ls -R

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: changelog.md
          files: |
            FuckAD_*.zip